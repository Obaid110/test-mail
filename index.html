<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Client Website</title>
</head>
<body>

    <h2>Send Form Request</h2>
    
    <!-- A simple test form -->
    <form id="apiTestForm">
        <label for="msg">Message:</label>
        <input type="text" id="msg" name="message" required placeholder="Type something...">
        <button type="submit">Submit Request</button>
    </form>

    <!-- Response Message Box -->
    <div id="responseMessage" style="margin-top: 15px; font-weight: bold;"></div>

    <script>
        document.getElementById('apiTestForm').addEventListener('submit', function(event) {
            // Prevent the default HTML form page refresh
            event.preventDefault();

            const responseBox = document.getElementById('responseMessage');
            responseBox.style.color = 'black';
            responseBox.textContent = 'Checking domain authorization...';

            // REPLACE THIS URL with your actual backend server address (e.g., 'https://onrender.com')
            const backendApiUrl = 'http://localhost:3000/send';

            // Send the request to your Express server
            fetch(backendApiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // Sending an empty body because the server reads the domain from headers
                body: JSON.stringify({}) 
            })
            .then(async (response) => {
                const data = await response.json();
                
                if (response.ok) {
                    responseBox.style.color = 'green';
                    responseBox.textContent = data.message;
                } else {
                    responseBox.style.color = 'red';
                    responseBox.textContent = data.error || 'Authorization failed.';
                }
            })
            .catch((error) => {
                console.error('Fetch Error:', error);
                responseBox.style.color = 'red';
                responseBox.textContent = 'Could not connect to the backend server.';
            });
        });
    </script>

</body>
</html>
