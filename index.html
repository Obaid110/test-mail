<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mailtree Test</title>
</head>
<body>

<h2>Send Email Request</h2>

<form id="apiTestForm">
  <input type="text" id="msg" placeholder="Type message..." required />
  <button type="submit">Send</button>
</form>

<div id="responseMessage" style="margin-top:10px;font-weight:bold;"></div>

<script>
document.getElementById('apiTestForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const msg = document.getElementById('msg').value;
  const box = document.getElementById('responseMessage');

  box.textContent = "Sending...";

  try {
    const res = await fetch("https://mailtree.vercel.app/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    if (res.ok) {
      box.style.color = "green";
      box.textContent = data.message;
    } else {
      box.style.color = "red";
      box.textContent = data.error || "Failed";
    }

  } catch (err) {
    box.style.color = "red";
    box.textContent = "Server not reachable";
  }
});
</script>

</body>
</html>
