<script>
document.getElementById('apiTestForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const responseBox = document.getElementById('responseMessage');
    const messageInput = document.getElementById('msg').value;

    responseBox.style.color = 'black';
    responseBox.textContent = 'Sending request to Mailtree...';

    // ✅ Correct backend URL
    const backendApiUrl = 'https://mailtree.vercel.app/send';

    fetch(backendApiUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            message: messageInput
        })
    })
    .then(async (response) => {
        const data = await response.json();

        if (response.ok) {
            responseBox.style.color = 'green';
            responseBox.textContent = data.message || 'Sent successfully';
        } else {
            responseBox.style.color = 'red';
            responseBox.textContent = data.error || 'Request failed';
        }
    })
    .catch((error) => {
        console.error('Fetch Error:', error);
        responseBox.style.color = 'red';
        responseBox.textContent = 'Server connection failed.';
    });
});
</script>
